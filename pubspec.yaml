name: pakfasal_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  http: ^1.6.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.5+1
  url_launcher: ^6.3.2
  fl_chart: ^0.68.0
  path_provider: ^2.1.5
  geolocator: ^14.0.2
  intl: ^0.20.2
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.3
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # App icon
  flutter_launcher_icons: ^0.14.4

# ─────────────────────────────
# APP ICON CONFIG
# ─────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/PakFASAL.png
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: assets/icons/PakFASAL.png
  remove_alpha_ios: true

# ─────────────────────────────
# FLUTTER CONFIG
# ─────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/icons/PakFASAL.png